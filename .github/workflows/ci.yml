name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # fc-dev's build.rs invokes `pnpm build` to embed the frontend into the
  # binary via rust-embed. For clippy / test we don't need a real bundle,
  # just enough that the `#[folder = "../../frontend/dist/"]` macro finds
  # a non-empty directory. Each Rust job creates a stub before invoking
  # cargo, then exports this flag to skip the actual build.
  FC_SKIP_FRONTEND_BUILD: "1"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Stub frontend/dist (skip-build mode)
        run: |
          mkdir -p frontend/dist
          # rust-embed will fail on an empty directory in some versions;
          # a placeholder index.html keeps the macro happy.
          echo "<!doctype html><title>stub</title>" > frontend/dist/index.html

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Stub frontend/dist (skip-build mode)
        run: |
          mkdir -p frontend/dist
          echo "<!doctype html><title>stub</title>" > frontend/dist/index.html

      - name: Run tests
        run: cargo test --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # `packageManager` field lives in frontend/package.json, not the
      # repo-root package.json — point pnpm/action-setup at it explicitly.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
