name: "GET /api/me — current principal"

# Roundtrip of the auth context: both binaries should resolve the
# bearer token to the same principal id and emit the same JSON shape.
# The id is left as `any-string` rather than `tsid` because the test
# principal is whatever the operator authenticated as (could be a
# typed or untyped id depending on bootstrap flow).

request:
  method: GET
  path: /api/me
  headers:
    Authorization: "Bearer ${ANCHOR_TOKEN}"

expect:
  status: 200
  body_shape:
    principalId: any-string
    principalType: any-string
    scope: any-string
    roles: any-array
    accessibleClientIds: any-array
    accessibleApplicationIds: any-array
