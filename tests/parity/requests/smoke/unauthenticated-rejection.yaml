name: "GET /api/event-types without auth — 403"

# Confirms the authenticator middleware is wired identically on both
# binaries and returns the same status + error envelope shape. The
# platform envelope is `{ "error": "UNAUTHENTICATED", "message": "..." }`
# (the `error` field carries the code, matching Rust ErrorResponse) —
# the OAuth `/oauth/*` endpoints use `{ "error": ..., "error_description": ... }`.
#
# (Earlier docs/api-parity.md suggested 401 — the binary returns 403.
# The harness's first self-test caught this divergence in the YAML
# expectation; left as a worked example of why the harness pays off
# immediately, even on a same-server self-test.)

request:
  method: GET
  path: /api/event-types

expect:
  status: 403
  body_shape:
    error: any-string
    message: any-string
