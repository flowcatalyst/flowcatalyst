[package]
name = "fc-mcp-server"
version = "0.1.0"
edition.workspace = true
description = "Standalone binary for the FlowCatalyst MCP server"
license.workspace = true

[[bin]]
name = "fc-mcp-server"
path = "src/main.rs"

[dependencies]
fc-mcp = { path = "../../crates/fc-mcp" }

tokio = { workspace = true }
anyhow = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { version = "4.5", features = ["derive", "env"] }
